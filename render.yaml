databases:
  - name: finwise-db
    plan: free


services:
  - type: web
    name: finwise-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finwise-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

